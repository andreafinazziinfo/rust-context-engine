name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  checks: write
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache Cargo Dependencies
      uses: actions/cache@v6
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          rtk/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('rtk/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Check Formatting
      run: cargo fmt --manifest-path rtk/Cargo.toml --all -- --check

    - name: Clippy Linting
      run: cargo clippy --manifest-path rtk/Cargo.toml --workspace --all-targets -- -D warnings

    - name: Build Release (locked)
      run: cargo build --manifest-path rtk/Cargo.toml --release --locked

    - name: Run Unit Tests
      run: cargo test --manifest-path rtk/Cargo.toml --workspace

    - name: Filter savings regression gate (CI-3)
      if: runner.os == 'Linux'
      run: cargo test --manifest-path rtk/Cargo.toml -p rtk-context-filters token_savings

    - name: Release smoke (REL-1)
      if: runner.os == 'Linux'
      run: bash scripts/release_smoke.sh

    - name: Security Audit
      if: runner.os == 'Linux'
      uses: actions-rust-lang/audit@v1
      with:
        ignore: RUSTSEC-2026-0009, RUSTSEC-2025-0119, RUSTSEC-2024-0436
        workingDirectory: rtk
