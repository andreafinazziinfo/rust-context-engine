name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: rtk
            asset_name: rtk-linux-amd64.tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: rtk.exe
            asset_name: rtk-windows-amd64.zip
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: rtk
            asset_name: rtk-macos-amd64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: rtk
            asset_name: rtk-macos-arm64.tar.gz

    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Build Binary
      run: |
        cargo build --release --target ${{ matrix.target }} --manifest-path rtk/Cargo.toml

    - name: Package Binary (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        cd rtk/target/${{ matrix.target }}/release
        compress-archive -path ${{ matrix.artifact_name }} -destinationpath ../../../../${{ matrix.asset_name }}

    - name: Package Binary (Unix)
      if: matrix.os != 'windows-latest'
      run: |
        cd rtk/target/${{ matrix.target }}/release
        tar -czf ../../../../${{ matrix.asset_name }} ${{ matrix.artifact_name }}

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ matrix.asset_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
